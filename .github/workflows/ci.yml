---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install lefthook remotes
        run: >-
          TERM=dumb nix develop --accept-flake-config
          .#ci --ignore-environment --keep TERM
          --command lefthook install
      - name: Pre-commit checks
        run: >-
          TERM=dumb nix develop --accept-flake-config
          --ignore-environment --keep TERM .#ci
          --command bash -c 'lefthook run pre-commit --all-files'
      - name: Pre-push checks
        run: >-
          TERM=dumb nix develop --accept-flake-config
          --ignore-environment --keep TERM .#ci
          --command bash -c 'lefthook run pre-push --all-files'
      - name: Unit tests
        run: >-
          TERM=dumb nix develop --accept-flake-config
          --ignore-environment --keep TERM .#ci
          --command bash -c
          'BATS_LIB_PATH="$(dirname "$(which bats)")/../share/bats"
          bats --recursive tests/unit/'

  build-macos:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install lefthook remotes
        run: >-
          TERM=dumb nix develop --accept-flake-config
          .#ci --ignore-environment --keep TERM
          --command lefthook install
      - name: Pre-commit checks
        run: >-
          TERM=dumb nix develop --accept-flake-config
          --ignore-environment --keep TERM .#ci
          --command bash -c 'lefthook run pre-commit --all-files'
      - name: Pre-push checks
        run: >-
          TERM=dumb nix develop --accept-flake-config
          --ignore-environment --keep TERM .#ci
          --command bash -c 'lefthook run pre-push --all-files'
      - name: Unit tests
        run: >-
          TERM=dumb nix develop --accept-flake-config
          --ignore-environment --keep TERM .#ci
          --command bash -c
          'BATS_LIB_PATH="$(dirname "$(which bats)")/../share/bats"
          bats --recursive tests/unit/'
